services:
  hireready-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hireready-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8787:8787"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8787/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
